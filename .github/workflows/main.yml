  name: Degree Jobs Fresher Bot

  on:
    schedule:
      - cron: '*/10 * * * *'  # Every 10 minutes
    workflow_dispatch:  # Manual trigger button

  concurrency:
    group: bot-run
    cancel-in-progress: false

  jobs:
    run-bot:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
      - uses: actions/checkout@v4

      - name: Check files
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files in current directory:"
          ls -lah
          echo ""
          echo "Checking for bot.py:"
          if [ -f bot.py ]; then
            echo "✅ bot.py found"
          else
            echo "❌ bot.py NOT found"
            find . -name "bot.py" 2>/dev/null || echo "bot.py not found anywhere"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create requirements.txt if missing
        run: |
          if [ ! -f requirements.txt ]; then
            echo "Creating requirements.txt..."
            cat > requirements.txt << 'EOF'
          requests
          beautifulsoup4
          lxml
          EOF
          fi
          echo "Requirements.txt contents:"
          cat requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot once
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          if [ -f bot.py ]; then
            python bot.py
          else
            echo "ERROR: bot.py not found!"
            echo "Current directory: $(pwd)"
            echo "Files: $(ls -la)"
            exit 1
          fi

      - name: Commit updates
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "GitHub Bot"
          git pull --rebase origin main || true
          git add bot.log seen_jobs.json requirements.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Bot run: $(date)"
          git push || true

      - name: Notify on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=❌ Degree Jobs Fresher Bot failed" \
            -d "parse_mode=Markdown" || true
